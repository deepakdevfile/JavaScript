<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script defer src="98_script.js"></script>
</head>
<body>
    <form action="/" method="post">
        <div>
            <label for="comment">Add a comment here: </label>
            <input type="text" id="comment" name="comment" value="I'm a text field">
        </div>

        <hr>

        <div>
            <label for="email">Enter your email address: </label>
            <input type="email" name="email" id="email">
        </div>

        <hr>

        <div>
            <label for="password">Enter your password</label>
            <input type="password" name="password" id="password">
        </div>

        <hr>

        <div>
            <label for="search">Search</label>
            <input type="search" id="search" name="search">
        </div>

        <hr>

        <div>
            <label for="tel">Enter your number: </label>
            <input type="tel" id="tel" name="tel">
        </div>

        <hr>

        <div>
            <label for="web">Web address: </label>
            <input type="url" id="web" name="web">
        </div>

        <hr>

        <div>
            <label for="number"></label>
            <input type="number" id="number" name="number">
        </div>
        <div>
            <label for="number2">Enter an odd number between 1 and 10:</label>
            <input type="number" id="number2" name="number2" min="1" max="10" step="0.01">
        </div>
        <div>
            <label for="price">Choose a maximum house price: </label>
            <input type="range" name="price" id="price" min="50000" max="500000000" step="10000" value="250000">
            <output class="price-output" for="price"></output>
        </div>

        <hr>

        <div>
            <label for="date">Enter the date: </label>
            <input type="date" name="date" id="date">
        </div>
        
        <div>
            <label for="datetime" >Enter the date and time</label>
            <input type="datetime-local" name="datetime" id="datetime">
        </div>

        <div>
            <label for="month">Enter the month</label>
            <input type="month" id="month" name="month">
        </div>

        <div>
            <label for="time">Enter the time: </label>
            <input type="time" name="time" id="time">
        </div>

        <div>
            <label for="week">Enter the week</label>
            <input type="week" name="week" id="week">
        </div>

        <div>
            <label for="myDate">Constrained date and time selection</label>
            <input type="date" name="myDate" id="myDate" min="2025-06-01" max="2025-10-31" step="7">
        </div>

        <hr>

        <div>
            <label for="color">Pick a color: </label>
            <input type="color" name="color" id="color">
        </div>
    
        <button type="submit">Submit me!</button>
    </form>
</body>
</html>
