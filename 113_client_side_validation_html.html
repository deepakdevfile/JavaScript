
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="113_style.css">
    <script src="113_script.js" defer></script>
</head>
<body>
    <form action="" method="get">
        <p>Please complete all required (*) fields.</p>
        
        <fieldset>
            <legend>Do you have a driver's license? *</legend>
            <input type="radio" name="license" id="yes" value="yes" required>
            <label for="yes">Yes</label>
            <input type="radio" name="license" id="no" value="no" required>
            <label for="no">No</label>
        </fieldset>
        <div>
            <label for="age">How old are you?</label>
            <input type="number" id="age" min="12" max="120" step="1">
        </div>
        <p>
            <label for="fruit">What is your favourite fruit? *</label>
            <input 
                type="text" 
                id="fruit" 
                name="fruit" 
                required 
                list="list"
                pattern="[Bb]anana|[Aa]pple|[Cc]herry|[Gg]rape|[Kk]iwi|[Mm]ango|[Pp]ineapple|[Pp]apaya"
                >
            <datalist id="list">
                <option value="apple">Apple</option>
                <option value="banana">Banana</option>
                <option value="cherry">Cherry</option>
                <option value="dragon fruit">Dragon fruit</option>
                <option value="grape">Grapes</option>
                <option value="kiwi">Kiwi</option>
                <option value="mago">Mango</option>
                <option value="pineapple">Pineapple</option>
                <option value="papaya">Papaya</option>
            </datalist>
        </p>
        <div>
            <label for="email">What's your email address? </label>
            <input type="email" id="email" name="email">
        </div>
        <div>
            <label for="message">Leave a short message</label>
            <textarea name="message" id="message" maxlength="140" rows="5"></textarea>
        </div>
        <p>
            <button type="submit">Submit</button>
        </p>
    </form>
</body>
</html>
