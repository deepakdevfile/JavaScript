<!DOCTYPE html>
<html lang="en">

<body>
    <form>
        <fieldset>
            <legend>Choose your favorite fruit</legend>
            <p>
                <label>
                    <input type="radio" name="fruit" value="cherry" />

                </label>
            </p>
            <p>
                <label>
                    <input type="radio" name="fruit" value="banana" />
                    Banana
                </label>
            </p>
            <p>
                <label>
                    <input type="radio" name="fruit" value="strawberry" />
                    Strawberry
                </label>
            </p>
        </fieldset>
    </form>
</body>
</html>
