<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="110_style.css">
</head>
<body>
    <form action="#">
        <fieldset>
            <legend>Chosse your favourite fruit</legend>
            <p>
                <input type="radio" name="fruit" value="mango" id="mango">
                <label for="mango">Mango</label>
                <span></span>
            </p>
            <p>
                <input type="radio" name="fruit" value="apple" id="apple" checked>
                <label for="apple">Apple</label>
                <span></span>
            </p>
            <p>
                <input type="radio" name="fruit" value="papaya" id="papaya">
                <label for="papaya">Papaya</label>
                <span></span>
            </p>
        </fieldset>
    </form>
</body>
</html>
