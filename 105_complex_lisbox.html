<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="105_style.css">
    <script src="105_script.js" defer></script>
</head>
<body>
    <form action="/">
        <h2>Contact Select</h2>
        <div class="wrapper">
            <div class="filter">
                <input type="text" aria-label="Filter contacts" placeholder="Filter by name, e.g. amara"/>
            </div>
            <div class="options">
                <select name="contact-select" aria-label="Select contacts" multiple></select>
            </div>
            <div class="edit">
                <a href="#">Edit contacts</a>
            </div>
        </div>
    </form>
</body>
</html>
