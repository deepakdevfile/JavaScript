<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="118_style.css">
</head>
<body>
    <div class="side">
        <div class="logo">
            <img src="./odin-lined.png" alt="The Odin Project Logo">
        </div>
    </div>
    <div class="sign_up">
        <h1>Sign up for Life (basically fuck around and find out).</h1>
        <p>The more you fuck around more you gonna find out. You does not fuck around, you never gonna find out.</p>
        <form action="#">
            <div>
                <label for="fname">First Name</label>
                <input type="text" id="fname" name="fname">
            </div>
            <div>
                <label for="lname">Last Name</label>
                <input type="text" id="lname" name="lname">
            </div>
            <div>
                <label for="email">Email</label>
                <input type="email" id="email" name="email">
            </div>
            <div>
                <label for="tel">Phone Number</label>
                <input type="tel" id="tel" name="tel">
            </div>
            <div>
                <label for="password">Password</label>
                <input type="password" id="password" name="password">
            </div>
            <div>
                <label for="cpassword">Confirm password</label>
                <input type="cpassword" id="cpassword" name="cpassword">
            </div>
            <button>Submit</button>
        </form>
    </div>
</body>
</html>
