<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="112_style.css">
</head>
<body>
    <header class="speaker_form_header">
        <h1>Speaker Submission</h1>
        <p><em>Want to speak at our fake conference? Fill out this form.</em></p>
    </header>
    <form action="" method="get" class="speaker_form">
        <div class="form_row">
            <label for="name">Name</label>
            <input type="text" id="name" name="name">
        </div>

        <div class="form_row">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="joe@example.com">
        </div>
        <fieldset class="legacy_form_row">
            <legend>Type of Talk</legend>
            <input type="radio" name="talk" id="main" value="main-stage">
            <label for="main" class="radio_label">Main Stage</label>
            <input type="radio" name="talk" id="workshop" value="workshop" checked>
            <label for="workshop" class="radio_label">Workshop</label>
        </fieldset>
        <div class="form_row">
            <label for="tshirt">T-Shirt Size</label>
            <select name="tshirt" id="tshirt">
                <option value="xs">Extra Small</option>
                <option value="s">Small</option>
                <option value="m">Medium</option>
                <option value="l">Large</option>
                <option value="xl">Extra Large</option>
            </select>
        </div>
        <div class="form_row">
            <label for="abstract">Abstract</label>
            <textarea name="asbstract" id="abstract" cols="20" rows="3">Describe talk</textarea>
            <div class="instructions">Describe your talk in 500 words or less</div>
        </div>
        <div class="form_row">
            <label for="availability" class="checkbox_label"> <input type="checkbox" id="availability" name="availability" value="is_available"><span> I'm actually available the date of the talk</span></label>
        </div>
        <div class="form_row">
            <button>Submit</button>
        </div>
    </form>
</body>
</html>
