<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="101_style.css">
</head>
<body>
    <form action="/">
        <p>
            <label for="search">Search: </label>
            <input type="search" name="search" id="search">
        </p>
        <p>
            <label for="text">text: </label>
            <input type="text" name="text" type="text">
        </p>
        <p>
            <label for="date">date: </label>
            <input type="date" name="date" type="datetime-local">
        </p>
        <p>
            <label for="radio">radio: </label>
            <input type="radio" name="radio" type="radio">
        </p>
        <p>
            <label for="checkbox">checkbox: </label>
            <input type="checkbox" name="checkbox" type="checkbox">
        </p>
        <p><input type="submit" value="submit"></p>
        <p><input type="button" value="button"></p>
    </form>
    <form action="/">
        <fieldset>
            <legend>Fruit preferences</legend>
            <p>
                <input type="checkbox" name="fruit" value="mango" id="mango" disabled>
                <label for="mango">I like cherry</label>
            </p>
            <p>
                <input type="checkbox" name="fruit" value="banana" id="banana">
                <label for="banana">I can't like banana</label>
            </p>
            <p>
                <input type="checkbox" name="fruit" value="papaya" id="papaya">
                <label for="papaya">I like papaya</label>
            </p>
        </fieldset>
    </form>
</body>
</html>
