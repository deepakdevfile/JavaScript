<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="95_style.css">
</head>
<body>
    <form action="" method="">
        <h1>Payment form</h1>
        <p>Please complete all required (*) fields.</p>
        <section>
            <h2>Contact information</h2>
            
            <fieldset>
                <legend>Title</legend>
                <div>
                    <input type="radio" id="ace" name="ace">
                    <label for="ace">Ace</label>
                </div>
            
                <div>
                    <input type="radio" id="king" name="king">
                    <label for="king">King</label>
                </div>
            
                <div>
                    <input type="radio" id="queen" name="queen">
                    <label for="queen">Queen</label>
                </div>
            </fieldset>
            
            <div>
                <label for="name">Name *: </label>
                <input type="text" id="name" name="name" required>
            </div>
            
            <div>
                <label for="email">Email *: </label>
                <input type="email" id="email" name="email" required>
            </div>
            
            <div>
                <label for="password">Password *: </label>
                <input type="password" id="password" name="password" required>
            </div>
        </section>

        <section>
            <h2>Payment information</h2>
            <div>
                <label for="card">Card type: </label>
                <select name="card" id="card">
                    <option value="visa">Visa</option>
                    <option value="mastercard">Mastercard</option>
                    <option value="american express">American Express</option>
                </select>
            </div>
            
            <div>
                <label for="number">Card number *: </label>
                <input type="text" id="number" name="number" required>
            </div>
            
            <div>
                <label for="expiry">Expiration date *: </label>
                <input type="text" id="expiry" name="expiry" required placeholder="MM/YY" pattern="^(0[1-9]|1[0-2])\/([0-9]{2})$">
            </div>
        </section>

        <section>
            <div>
                <button type="submit">Validate the payment</button>
            </div>
        </section>
    </form>
</body>
</html>
