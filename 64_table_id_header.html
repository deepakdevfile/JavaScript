<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="64_style.css">
</head>

<body>
    <table>
        <caption>Items Sold August 2016</caption>
        <tr>
            <th colspan="2" rowspan="2"></th>
            <th id="clothes" colspan="3">Clothes</th>
            <th colspan="2" id="accessories">Accessories</th>
        </tr>
        <tr>
            <th scope="col" headers="clothes" id="trousers">Trousers</th>
            <th scope="col" headers="clothes" id="skirts">Skirts</th>
            <th scope="col" headers="clothes" id="dresses">Dresses</th>
            <th scope="col" headers="accessories" id="bracelets">Bracelets</th>
            <th scope="col" headers="accessories" id="rings">Rings</th>
        </tr>
        <tr>
            <th rowspan="3" id="belgium">Belgium</th>
            <th scope="row" headers="belgium" id="antwerp">Antwerp</th>
            <td headers="clothes trousers belgium antwerp">56</td>
            <td headers="clothes skirts belgium antwerp">22</td>
            <td headers="clothes dresses belgium antwerp">43</td>
            <td headers="accessories bracelets belgium antwerp">72</td>
            <td headers="accessories rings belgium antwerp">23</td>
        </tr>
        <tr>
            <th scope="row">Ghent</th>
            <td>46</td>
            <td>18</td>
            <td>50</td>
            <td>61</td>
            <td>15</td>
        </tr>
        <tr>
            <th scope="row">Brussels</th>
            <td>23</td>
            <td>24</td>
            <td>32</td>
            <td>51</td>
            <td>82</td>
        </tr>
        <tr>
            <th rowspan="2" scope="rowgroup">The Netherlands</th>
            <th scope="row">Amsterdam</th>
            <td>49</td>
            <td>27</td>
            <td>87</td>
            <td>38</td>
            <td>55</td>
        </tr>
        <tr>
            <th scope="row">Utrecht</th>
            <td>23</td>
            <td>99</td>
            <td>44</td>
            <td>39</td>
            <td>95</td>
        </tr>
    </table>
</body>

</html>
