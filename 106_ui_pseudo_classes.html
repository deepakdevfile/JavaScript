<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="106_style.css">
</head>
<body>
    <form action="#">
        <fieldset>
            <legend>Feedback form</legend>
            <p>Required fields are labelled with "required".</p>
            <div>
                <label for="fname">First Name: </label> <br>
                <input type="text" id="fname" name="fname" required>
                <span></span>
            </div>
            <div>
                <label for="lname">Last Name: </label><br>
                <input type="text" id="lname" name="lname" required>
                <span></span>
            </div>
            <div>
                <label for="age">Age (must be 12+): </label>
                <input type="number" id="age" name="age" min="12" max="120" required>
                <span></span>
            </div>
            <div>
                <label for="email">Email address (if you want a response)</label><br>
                <input type="text" id="email" name="email" optional>
            </div>
            <button>Submit</button>
        </fieldset>
    </form>
</body>
</html>
